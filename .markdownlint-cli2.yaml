# markdownlint-cli2 config for guildmaster.
# markdownlint-cli2 stops walking at the git root, so a per-user global
# config in the home directory isn't picked up from inside the repo.
# Mirrors the steward / afi-cli preset for workspace consistency.

config:
  default: true
  # MD013: Line length — disabled. Prose lines wrap at the reader.
  MD013: false
  # MD060: Table pipe spacing — disabled (stylistic preference).
  MD060: false
  # MD024: Duplicate headings — allow under different parents so Keep a
  # Changelog entries can each have ### Added / ### Changed / ### Fixed.
  MD024:
    siblings_only: true

ignores:
  - "node_modules/**"
  - ".local/**"
  # devague-generated artifacts (committed for provenance) — they reproduce the
  # exact CLI export, so they are not subject to hand-authored prose lint.
  - "docs/specs/**"
  - "docs/plans/**"
  # devague working state (frames/plans are committed as JSON; reviews are
  # git-ignored) — not hand-authored prose.
  - ".devague/**"
  # Vendored skill prompt templates (e.g. outsource's explore/review/write) are
  # raw LLM instruction text fed verbatim to a model, not hand-authored docs —
  # they intentionally open with prose, not an H1 (MD041), and carry $PLACEHOLDER
  # tokens. Linting them as markdown is a category error, and editing them to
  # satisfy a linter would fork the cited-verbatim copy (cite-don't-import).
  - ".claude/skills/**/prompts/**"
